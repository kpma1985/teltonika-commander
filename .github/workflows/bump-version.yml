name: Bump version

on:
  push:
    branches: [main]
    paths-ignore:
      - config.yaml

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Bump patch version in config.yaml
        run: |
          VERSION=$(grep '^version:' config.yaml | sed 's/version: "\(.*\)"/\1/')
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          sed -i "s/^version: \".*\"/version: \"$NEW_VERSION\"/" config.yaml
          echo "Bumped $VERSION → $NEW_VERSION"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config.yaml
          git commit -m "chore: bump version to $(grep '^version:' config.yaml | sed 's/version: "\(.*\)"/\1/')"
          git push
